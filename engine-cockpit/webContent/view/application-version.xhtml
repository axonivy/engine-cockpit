<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:p="http://primefaces.org/ui" xmlns:cc="jakarta.faces.composite/composite"
  xmlns:ccc="jakarta.faces.composite/composite">
<h:body>
  <f:metadata>
    <f:viewParam name="context" value="#{applicationVersionBean.context}" />
    <f:viewParam name="app" value="#{applicationVersionBean.app}" />
    <f:viewParam name="version" value="#{applicationVersionBean.version}" />
    <f:viewAction action="#{applicationVersionBean.onload}" />
  </f:metadata>

  <ui:composition template="../includes/template/template.xhtml">

    <ui:define name="breadcrumb">
      <li><a href="applications.xhtml">#{ivy.cm.co('/common/Applications')}</a></li>
      <li>/</li>
      <li><a href="#{applicationVersionBean.applicationLink}">#{applicationVersionBean.app}</a></li>
      <li>/</li>
      <li><a href="#">#{applicationVersionBean.version}</a></li>
    </ui:define>

    <ui:define name="topbar-items">
      <cc:TopBarItem href="#{advisorBean.cockpitEngineGuideUrl}applications.html#application-detail" />
    </ui:define>

    <ui:define name="content">
      <div class="layout-dashboard">
        <div class="grid">
          <div class="col-12 md:col-12 xl:col-6">
            <cc:Information id="information" />
          </div>
          <div class="col-12 md:col-12 xl:col-6">
            <cc:State id="state" state="#{applicationVersionBean.state}" />
          </div>
          <div class="col-12 md:col-12 xl:col-12">
            <div class="card">
              <h:form id="versionProjectsForm" onkeypress="if (event.keyCode == 13) return false;">
                <p:growl id="applicationMessage" showDetail="true" />

                <div class="card-header">
                  <div class="card-title flex align-items-center">
                    <i class="pr-3 ti ti-cube card-title-icon"></i>
                    <h6 class="m-0">Projects</h6>
                    <p:commandButton icon="ti ti-upload" title="#{ivy.cm.co('/common/Deployment')}"
                      value="#{ivy.cm.co('/common/Deployment')}" styleClass="ml-auto ui-button-primary" process="@this"
                      actionListener="#{deploymentBean.setAppNameAndVersion(applicationVersionBean.context, applicationVersionBean.app, applicationVersionBean.version)}"
                      update=":deployPanel" oncomplete="PF('fileUploadModal').show();" />
                  </div>
                </div>

                <p:dataTable id="projectsTable" value="#{applicationVersionBean.projectRows}" var="row"
                  rowIndexVar="idx" widgetVar="projectsTable" styleClass="ui-fluid"
                  emptyMessage="#{ivy.cm.co('/common/NoRecordsFound')}">
                  <f:facet name="header">
                    <div class="ui-input-icon-left filter-container">
                      <i class="ti ti-search" />
                      <p:inputText id="globalFilter"
                        placeholder="#{ivy.cm.co('/common/SearchPlaceholder')}"
                        value="#{applicationVersionBean.nameFilter}">
                        <p:ajax event="keyup" process="@this" update="projectsTable" delay="300" />
                      </p:inputText>
                    </div>
                  </f:facet>
                  <p:column headerText="#{ivy.cm.co('/common/Name')}">
                    <h:outputLink value="#{row.link}">
                      <i class="pr-3 ti ti-cube card-title-icon"></i>
                      <h:outputText value="#{row.name}" />
                    </h:outputLink>
                  </p:column>

                  <p:column headerText="#{ivy.cm.co('/common/Version')}" style="width: 180px;">
                    <h:outputText value="#{row.version}" />
                  </p:column>

                  <p:column headerText="#{ivy.cm.co('/applications/LastChangeDate')}" style="width: 220px;">
                    <h:outputText value="#{row.lastChanged}" />
                  </p:column>
                </p:dataTable>
              </h:form>
            </div>
          </div>
        </div>
      </div>
      <h:panelGroup id="deployPanel">
        <cc:Deployment id="deployment" />
      </h:panelGroup>
    </ui:define>
  </ui:composition>
</h:body>

</html>
