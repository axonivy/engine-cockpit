<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:cc="http://xmlns.jcp.org/jsf/composite/composite">
<h:body>
  <f:metadata>
    <f:viewParam name="context" value="#{applicationBean.context}" />
    <f:viewParam name="app" value="#{applicationBean.app}" />
    <f:viewAction action="#{applicationBean.onload}" />
  </f:metadata>

  <ui:composition template="../includes/template/template.xhtml">

    <ui:define name="head">
      <h:outputStylesheet name="resources/codemirror/css/dark.css" />
    </ui:define>

    <ui:define name="breadcrumb">
      <li><a href="applications.xhtml">#{ivy.cm.co('/common/Applications')}</a></li>
      <li>/</li>
      <li><a href="#">#{applicationBean.app}</a></li>
    </ui:define>

    <ui:define name="topbar-items">
      <cc:TopBarItem styleClass="config-link" href="#{managerBean.configLogUrl}" icon="ti ti-file-text"
        title="#{ivy.cm.co('/common/ShowConfigurationLog')}" external="false" />
      <cc:TopBarItem href="#{advisorBean.cockpitEngineGuideUrl}applications.html#application-detail" />
    </ui:define>

    <ui:define name="content">
      <div class="layout-dashboard">
        <div class="grid">
          <div class="col-12 md:col-12 xl:col-6">
            <div class="card">
              <div class="card-header">
                <div class="card-title flex align-items-center">
                  <i class="pr-3 ti ti-info-circle"></i>
                  <h6 class="m-0">Information</h6>
                </div>
              </div>
              <p:panelGrid columns="2" columnClasses="col-12 md:col-4 lg:col-4, col-12 md:col-8 lg:col-8" layout="flex"
                styleClass="grey-label-panel">
                <label>#{ivy.cm.co('/common/Name')}</label>
                <h:outputText id="name" value="#{applicationBean.app}" />
              </p:panelGrid>
            </div>
          </div>
          <div class="col-12 md:col-12 xl:col-6">
            <cc:Security id="security" application="#{applicationBean.application}"
            securitySystem="#{applicationBean.securitySystem}" />
          </div>
          <div class="col-12 md:col-12 xl:col-6">
            <cc:Application id="application" bean="#{applicationBean}" />
          </div>
          <div class="col-12 md:col-12 xl:col-6">
            <cc:ApplicationConfiguration id="configuration" bean="#{applicationBean}" />
          </div>
        </div>
      </div>
      <h:panelGroup id="deployPanel">
        <cc:Deployment id="deployment" />
      </h:panelGroup>
    </ui:define>
  </ui:composition>
</h:body>

</html>
