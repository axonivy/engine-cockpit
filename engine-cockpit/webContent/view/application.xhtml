<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:cc="http://xmlns.jcp.org/jsf/composite/composite">
<h:body>
  <f:metadata>
    <f:viewParam name="appName" value="#{applicationDetailBean.appName}" />
    <f:viewAction action="#{applicationDetailBean.onload}" />
  </f:metadata>

  <ui:composition template="../includes/template/template.xhtml">
  
    <ui:define name="head">
      <h:outputStylesheet name="resources/codemirror/css/dark.css" />
    </ui:define>

    <ui:define name="breadcrumb">
      <li><a href="applications.xhtml">#{ivy.cm.co('/common/Applications')}</a></li>
      <li>/</li>
      <li><a href="#">#{applicationDetailBean.appName}</a></li>
    </ui:define>
    
    <ui:define name="topbar-items">
      <cc:TopBarItem styleClass="config-link" href="#{managerBean.configLogUrl}" icon="ti ti-file-text" title="#{ivy.cm.co('/common/ShowConfigurationLog')}" external="false" />
      <cc:TopBarItem href="#{advisorBean.cockpitEngineGuideUrl}applications.html#application-detail" />
    </ui:define>

    <ui:define name="content">
      <div class="layout-dashboard">
        <p:growl for="applicationMessage" id="applicationMessage" showDetail="true" />
        <div class="card mb-3">
          <div class="flex align-items-center mb-3">
            <i class="pr-3 ti ti-cube card-title-icon"></i>
            <h2 class="m-0 ">Application</h2>
            <h2 class="m-0 ml-2 text-xl font-normal text-600">#{applicationDetailBean.appName}</h2>
            <p:commandButton icon="ti ti-plus" value="Create New Version"
              styleClass="ml-auto ui-button-primary" process="@this"
              actionListener="#{applicationDetailBean.createVersion}"
              update=":versionsForm:versionsTable" />
          </div>
          <h:form id="versionsForm">
            <div class="table-search flex ui-fluid">
              <span class="ui-input-icon-left filter-container">
                <i class="ti ti-search"/>
                <p:inputText id="globalFilter" placeholder="#{ivy.cm.co('/common/SearchPlaceholder')}" >
                  <p:ajax event="keyup" delay="300" update=":versionsForm:versionsTable" />
                </p:inputText>
              </span>
            </div>
            <p:dataTable id="versionsTable" value="#{applicationDetailBean.versionRows}" 
              var="version" rowIndexVar="idx">
              <p:column headerText="#{ivy.cm.co('/common/Version')}" >
                <h:link value="#{version.version}" outcome="application-version.xhtml">
                  <i class="ti ti-packages table-icon" />
                  <f:param name="appName" value="#{applicationDetailBean.appName}" />
                  <f:param name="appVersion" value="#{version.version}" />
                </h:link>
              </p:column>

              <p:column headerText="#{ivy.cm.co('/pmvDetail/ReleaseState')}" style="text-align: center; width: 100px;">
                <i class="#{version.releaseStateIcon} table-icon" title="#{version.releaseState}"></i>
              </p:column>

              <p:column headerText="#{ivy.cm.co('/pmvDetail/ActivityState')}" style="text-align: center; width: 100px;">
                <i class="#{version.activityStateIcon} table-icon" title="#{version.activityState}"></i>
              </p:column>

              <p:column headerText="#{ivy.cm.co('/applications/RunningCasesHeader')}" style="text-align: center; width: 150px;">
                <h:panelGroup layout="block">
                  <h:outputText value="#{version.runningCasesCount}" />
                </h:panelGroup>
              </p:column>
              <p:column style="text-align: center; width: 150px;">
                <p:commandButton icon="ti ti-upload" title="#{ivy.cm.co('/common/Deployment')}"
                  styleClass="ml-1 ui-button-primary rounded-button" process="@this"
                  actionListener="#{deploymentBean.setAppNameAndVersion(applicationDetailBean.securitySystem.securitySystemName, applicationDetailBean.appName, version.version)}"
                  update=":deployPanel" oncomplete="PF('fileUploadModal').show();" />
                <p:commandButton icon="ti ti-player-play" title="#{ivy.cm.co('/common/Activate')}" 
                  disabled="#{version.application.notStartable}"
                  styleClass="ml-1 ui-button-success rounded-button">
                  <p:ajax listener="#{version.application.activate}" update=":versionsForm:versionsTable" />
                </p:commandButton>
                <p:commandButton icon="ti ti-player-stop" title="#{ivy.cm.co('/common/Deactivate')}" 
                  disabled="#{version.application.notStopable}"
                  styleClass="ml-1 ui-button-danger rounded-button">
                  <p:ajax listener="#{version.application.deactivate}" update=":versionsForm:versionsTable" />
                </p:commandButton>
                <p:commandButton title="#{ivy.cm.co('/common/More')}" id="tasksButton" type="button" icon="ti ti-menu-2"
                  styleClass="ml-1 ui-button-secondary rounded-button ui-button-outlined" />
                <p:menu overlay="true" trigger="tasksButton" my="right top" at="right bottom" id="activityMenu">
                  <p:menuitem value="#{ivy.cm.co('/common/Lock')}" icon="ti ti-lock" disabled="#{version.application.notLockable}"
                    actionListener="#{version.application.lock}" update=":versionsForm:versionsTable" />
                  <p:menuitem value="#{ivy.cm.co('/applications/ReleaseButtonTitle')}" icon="ti ti-crane"
                    disabled="#{not version.application.releasable}" actionListener="#{version.application.release}" update=":versionsForm:versionsTable" />
                  <p:menuitem id="deleteBtn" value="#{ivy.cm.co('/common/Delete')}" icon="ti ti-trash" disabled="#{not empty version.application.isDeletable()}"
                    actionListener="#{version.application.delete}" update=":versionsForm:versionsTable"
                    title="#{version.application.notDeletableMessage}" style="pointer-events: all;" />
                  <p:menuitem id="forceDeleteBtn" value="#{ivy.cm.co('/applications/ForceDeleteButtonTitle')}" rendered="#{not empty version.application.isDeletable()}" icon="ti ti-trash"
                    actionListener="#{version.application.delete}" update=":versionsForm:versionsTable" />
                </p:menu>
              </p:column>

            </p:dataTable>
          </h:form>
        </div>
        <div class="grid"> 
          <div class="col-12 md:col-12 xl:col-6">
            <div class="grid">
              <div class="col-12">
              <cc:Security id="security" 
              application="#{applicationDetailBean.application}"
              securitySystem="#{applicationDetailBean.securitySystem}" />
             </div>
            </div>
          </div>
            <div class="col-12 md:col-12 xl:col-6">
            <div class="grid">
              <div class="col-12">
                  <cc:ApplicationConfiguration id="configuration" bean="#{applicationDetailBean}" />
                </div>
              </div>
            </div>
        </div>
        <h:panelGroup id="deployPanel">
          <cc:Deployment id="deployment" appName="#{applicationDetailBean.appName}" appVersion="#{applicationDetailBean.latestVersion}" />
        </h:panelGroup>
      </div>
    </ui:define>
  </ui:composition>
</h:body>

</html>
