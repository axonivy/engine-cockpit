<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:cc="http://xmlns.jcp.org/jsf/composite/composite">
<h:body>
  <f:metadata>
    <f:viewAction action="#{applicationsBean.onload}" />
  </f:metadata>
  <ui:composition template="../includes/template/template.xhtml">

    <ui:define name="breadcrumb">
      <li><a href="applications.xhtml">#{ivy.cm.co('/common/Applications')}</a></li>
    </ui:define>

    <ui:define name="topbar-items">
      <cc:TopBarItem href="#{advisorBean.cockpitEngineGuideUrl}applications.html#applications" />
    </ui:define>

    <ui:define name="content">
      <div class="card">
        <h:form id="form" onkeypress="if (event.keyCode == 13) return false;">
          <p:growl for="applicationMessage" id="applicationMessage" showDetail="true" />
          <div class="flex align-items-center mb-3">
            <i class="pr-3 ti ti-layout-grid card-title-icon"></i>
            <h2 class="m-0">#{ivy.cm.co('/common/Applications')}</h2>
            <p:commandButton styleClass="ml-auto" id="createApplicationBtn" widgetVar="createApplication" icon="ti ti-plus"
              value="#{ivy.cm.co('/common/Add')}" onclick="PF('newApplicationModal').show();" type="button" />
          </div>
        <cc:SecuritySystemTabs tabChange="#{applicationsBean.reload}" id="tabs">
          <div>
            <div class="table-search flex ui-fluid">
              <span class="ui-input-icon-left filter-container">
                <i class="ti ti-search"/>
                <p:inputText id="globalFilter" placeholder="#{ivy.cm.co('/common/SearchPlaceholder')}"
                  value="#{applicationsBean.nameFilter}">
                  <p:ajax event="keyup" delay="300" update="applicationsTable" />
                </p:inputText>
              </span>
            </div>

            <p:dataTable id="applicationsTable" value="#{applicationsBean.applications}" var="app" >
              
              <p:column headerText="#{ivy.cm.co('/common/Name')}">
                <h:link value="#{app.name}" outcome="application.xhtml">
                  <i class="ti ti-cube table-icon" />
                  <f:param name="context" value="#{managerBean.selectedSecuritySystem.securitySystemName}" />
                  <f:param name="app" value="#{app.name}" />
                </h:link>
              </p:column>

              <p:column headerText="Released" style="text-align: center; width: 100px;">
                <h:outputLink value="#{app.releasedVersion.link}" rendered="#{app.releasedVersion != null}">
                  <i class="ti ti-packages table-icon" />
                  <h:outputText value="#{app.releasedVersion.version}" />
                </h:outputLink>
              </p:column>

              <p:column headerText="Deprecated" style="text-align: center; width: 150px;">
                <ui:repeat value="#{app.deprecatedVersions}" var="deprecatedVersion" varStatus="status">
                  <h:outputLink value="#{deprecatedVersion.link}">
                    <i class="ti ti-packages table-icon" />
                    <h:outputText value="#{deprecatedVersion.version}" />
                  </h:outputLink>
                  <h:outputText value=", " rendered="#{not status.last}" />
                </ui:repeat>
              </p:column>
            </p:dataTable>
          </div>
        </cc:SecuritySystemTabs>
        </h:form>
        <cc:NewApplication id="newApplication" />
      </div>
    </ui:define>
  </ui:composition>
</h:body>

</html>
