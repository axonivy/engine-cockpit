<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:cc="jakarta.faces.composite/composite">
<h:body>
  <ui:composition template="../includes/template/template.xhtml">

    <ui:define name="topbar-items">
      <cc:TopBarItem href="#{advisorBean.cockpitEngineGuideUrl}index.html" />
    </ui:define>

    <ui:define name="content">
      <div class="layout-dashboard">
        <div class="grid">
          <div class="col-12">
            <div class="grid">
              <cc:OverviewBox box="white" count="#{managerBean.sessionCount}" icon="ti ti-user-pin" title="#{ivy.cm.co('/common/Sessions')}"
                link="monitor-sessions.xhtml" />
              <cc:OverviewBox box="blue" count="#{managerBean.usersCount}" icon="ti ti-user-check" title="#{ivy.cm.co('/common/Users')}"
                link="users.xhtml" />
              <cc:OverviewBox box="gray" count="#{managerBean.runningCasesCount}" icon="ti ti-list"
                title="#{ivy.cm.co('/common/RunningCases')}" link="applications.xhtml" />
              <cc:OverviewBox box="darkgray" count="#{managerBean.applicationCount}" icon="ti ti-layout-grid" title="#{ivy.cm.co('/common/Applications')}"
                link="applications.xhtml" />
            </div>
          </div>
          
          <div class="col-12 md:col-6 xl:col-4">
             <cc:Health id="health" />
          </div>

          <div class="col-12 md:col-6 xl:col-4">
            <cc:Axonivy id="axonivy" />
          </div>

          <div class="col-12 md:col-6 xl:col-4">
            <cc:LicenceDashboard id="licence" />
          </div>
  
          <div class="col-12 md:col-6 xl:col-4">
            <cc:Email id="email" />
          </div>
                                                                                                                                                                                 
          <div class="col-12 md:col-6 xl:col-4">
            <cc:Systemdatabase id="systemDatabase" />
          </div>
  
          <div class="col-12 md:col-6 xl:col-4">
            <cc:Java id="java" />
          </div>
        </div>
      </div>
    </ui:define>
  </ui:composition>
</h:body>

</html>
