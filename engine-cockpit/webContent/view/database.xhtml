<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:cc="jakarta.faces.composite/composite">
<h:body>
  <f:metadata>
    <f:viewParam name="app" value="#{databaseBean.app}" />
    <f:viewParam name="name" value="#{databaseBean.name}" />
    <f:viewAction action="#{databaseBean.onload}" />
  </f:metadata>

  <ui:composition template="../includes/template/charts-template.xhtml">

    <ui:define name="breadcrumb">
      <li><span>#{ivy.cm.co('/common/Services')}</span></li>
      <li>/</li>
      <li><a href="databases.xhtml">#{ivy.cm.co('/common/Databases')}</a></li>
      <li>/</li>
      <li><a href="#{databaseBean.viewUrl}">#{databaseBean.name}</a></li>
      <cc:BreadcrumbInfos />
    </ui:define>

    <ui:define name="topbar-items">
      <li class="topbar-item help-dialog">
        <a href="#" onclick="PF('helpServicesModal').show();">
          <i class="topbar-icon ti ti-help-circle"></i>
        </a>
      </li>
    </ui:define>

    <ui:define name="content">
      <div class="layout-dashboard">
        <div class="grid">
          <div class="col-12 md:col-12 xl:col-6">
            <cc:DatabaseConfiguration id="databaseConfiguration" />
          </div>
          <div class="col-12 md:col-12 xl:col-6">
            <cc:DatabaseProperties id="databaseProperties" />
          </div>
          <div class="col-12 md:col-12 xl:col-6">
            <cc:DatabaseConnections id="databaseConnectionsCard" />
          </div>
          <div class="col-12 md:col-12 xl:col-6">
            <cc:DatabaseHistory id="databaseHistory" />
          </div>
        </div>
      </div>
      <cc:HelpServiceDialog service="#{databaseBean}" id="helpDatabaseDialog" />
    </ui:define>

    <ui:define name="live-stats">
      <cc:Sidebar jmxSource="#{databaseBean.liveStats.database}">
        <cc:LiveStats monitor="#{databaseBean.liveStats.connectionsMonitor}"
          id="databaseConnections" />
        <cc:LiveStats monitor="#{databaseBean.liveStats.queriesMonitor}" id="databaseQueries" />
        <cc:LiveStats monitor="#{databaseBean.liveStats.executionTimeMonitor}"
          id="databaseExecutionTime" />
      </cc:Sidebar>
    </ui:define>
  </ui:composition>
</h:body>

</html>
