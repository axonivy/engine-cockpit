<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:cc="http://xmlns.jcp.org/jsf/composite/composite">
<h:body>
  <f:metadata>
    <f:viewParam name="context" value="#{projectBean.context}" />
    <f:viewParam name="app" value="#{projectBean.app}" />
    <f:viewParam name="version" value="#{projectBean.version}" />
    <f:viewParam name="project" value="#{projectBean.projectName}" />
    <f:viewAction action="#{projectBean.onload}" />
  </f:metadata>

  <ui:composition template="../includes/template/template.xhtml">

    <ui:define name="breadcrumb">
      <li><a href="applications.xhtml">#{ivy.cm.co('/common/Applications')}</a></li>
      <li>/</li>
      <li><a href="#{projectBean.applicationDetailLink}">#{projectBean.app}</a></li>
      <li>/</li>
      <li><a href="#{projectBean.project.detailView}">#{projectBean.project.name}</a></li>
    </ui:define>

    <ui:define name="topbar-items">
      <cc:TopBarItem href="#{advisorBean.cockpitEngineGuideUrl}applications.html#project" />
    </ui:define>

    <ui:define name="content">
      <div class="layout-dashboard">
        <div class="grid">
          <div class="col-12 md:col-12 xl:col-12">
            <div class="card">
              <div class="card-header">
                <div class="card-title flex align-items-center">
                  <i class="pr-3 ti ti-info-circle"></i>
                  <h6 class="m-0">#{ivy.cm.co('/pmvDetail/PMVInformation')}</h6>
                </div>
              </div>

              <p:panelGrid columns="2" columnClasses="col-12 md:col-4 lg:col-4, col-12 md:col-8 lg:col-8" layout="flex"
                styleClass="grey-label-panel ui-fluid">
                <label>#{ivy.cm.co('/common/Name')}</label>
                <h:outputText value="#{projectBean.project.name}" />
                <label>Library ID</label>
                <h:outputText value="#{projectBean.project.libraryId}" />
                <label>Library #{ivy.cm.co('/common/Version')}</label>
                <h:outputText value="#{projectBean.project.libraryVersion}" />
                <label>#{ivy.cm.co('/pmvDetail/LastDeployed')}</label>
                <h:outputText value="#{projectBean.project.lastChanged}" />
                <label>#{ivy.cm.co('/pmvDetail/ProjectVersion')}</label>
                <h:outputText value="#{projectBean.project.projectVersion}" />
              </p:panelGrid>
            </div>
          </div>

          <div class="col-6">
            <div class="card">
              <div class="card-header">
                <div class="card-title flex align-items-center">
                  <i class="pr-3 ti ti-circle-arrow-up"></i>
                  <h6 class="m-0">#{ivy.cm.co('/pmvDetail/AllPMVsDependingOnPMV')}</h6>
                </div>
              </div>
              <p:dataTable id="dependentProjectsTable" var="project" value="#{projectBean.dependentProjects}"
                emptyMessage="#{ivy.cm.content('/pmvDetail/DependentPMVTableEmptyMessage').replace('name', projectBean.project.name).get()}">
                <p:column headerText="#{ivy.cm.co('/pmvDetail/PMV')}">
                  <h:outputLink value="#{project.detailView}">
                    <h:outputText value="#{project.name}" title="#{project.libraryId}">
                      <i class="ti ti-packages" style="margin-right: 5px;" />
                    </h:outputText>
                  </h:outputLink>
                </p:column>
                <p:column headerText="#{ivy.cm.co('/common/Version')}">
                  <h:outputText value="#{project.qualifiedVersion}" />
                </p:column>   
              </p:dataTable>
            </div>
          </div>

          <div class="col-6">
            <div class="card">
              <div class="card-header">
                <div class="card-title flex align-items-center">
                  <i class="pr-3 ti ti-circle-arrow-down"></i>
                  <h6 class="m-0">#{ivy.cm.co('/pmvDetail/AllPMVsRequiredByPMV')}</h6>
                </div>
              </div>
              <p:dataTable id="requiredPmvTable" var="project" value="#{projectBean.requiredProjects}"
                emptyMessage="#{ivy.cm.content('/pmvDetail/DependentPMVTableEmptyMessage').replace('name', projectBean.project.name).get()}">
                <p:column headerText="Projects">
                  <h:outputLink value="#{project.detailView}">
                    <h:outputText value="#{project.name}" title="#{project.libraryId}">
                      <i class="ti ti-packages" style="margin-right: 5px;" />
                    </h:outputText>
                  </h:outputLink>
                </p:column>
                <p:column headerText="#{ivy.cm.co('/common/Version')}">
                  <h:outputText value="#{project.qualifiedVersion}" />
                </p:column>
               </p:dataTable>
            </div>
          </div>
        </div>
      </div>
    </ui:define>
  </ui:composition>
</h:body>

</html>
