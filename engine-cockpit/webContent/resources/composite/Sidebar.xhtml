<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui">
<cc:interface>
  <cc:attribute name="jmxSource" default="" type="java.lang.String" />
</cc:interface>

<cc:implementation>
  <a href="#" id="layout-config-button" class="layout-config-button" onclick="PF('liveStatePoll').start();">
    <i class="ti ti-chart-histogram"></i>
  </a>
  
  <div id="layout-config" class="layout-config">
    <div class="layout-config-content">
      <div class="flex">
        <h3>#{ivy.cm.co('/sidebar/LiveStats')}</h3>
        <p:commandButton icon="ti ti-x" styleClass="ml-auto ui-button-danger ui-button-outlined rounded-button layout-config-close" 
          onclick="PF('liveStatePoll').stop(); $('#layout-config').toggleClass('layout-config-active');" type="button" />
      </div>

      <h:form id="config-form">
        <p:poll widgetVar="liveStatePoll" update="charts" interval="1" autoStart="false" />
        <h:panelGroup id="charts" layout="block" class="ui-g-12">
          <script type="text/javascript">
            if (!$('#layout-config').hasClass('layout-config-active')) {
              PF('liveStatePoll').stop();
            }
          </script>
          <p:staticMessage rendered="#{not empty cc.attrs.jmxSource}" severity="info"
            summary="#{ivy.cm.co('/sidebar/LiveStatsFoundFrom')}" detail="#{cc.attrs.jmxSource}" />
          <cc:insertChildren />
        </h:panelGroup>
      </h:form>
    </div>
  </div>
</cc:implementation>

</html>
