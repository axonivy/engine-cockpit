<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:c="jakarta.tags.core" xmlns:cc="jakarta.faces.composite">

<cc:implementation>

<p:dialog id="javaDetailDialog" header="#{ivy.cm.co('/javaInfo/JavaDetailDialogHeader')}" widgetVar="javaDetailDialog" modal="true" closeOnEscape="true"
  width="60%">
  <h:form id="javaInfoForm" style="max-height: 400px; overflow-y: auto;">
    <p:dataTable id="javaJVMInfoTable" var="arg" value="#{javaBean.jvmArguments}" emptyMessage="#{ivy.cm.co('/common/NoRecordsFound')}">
      <p:column headerText="#{ivy.cm.co('/javaInfo/JVMArgumentTableHeader')}">
        <h:outputText value="#{arg}" styleClass="jvm-key" />
      </p:column>
    </p:dataTable>
    <p:dataTable id="javaPropertiesInfoTable" var="property" value="#{javaBean.properties}" style="margin-top: 10px;">
      <p:column headerText="#{ivy.cm.co('/common/Name')}">
        <h:outputText value="#{property.key}" styleClass="javaprop-key" />
      </p:column>
      <p:column headerText="#{ivy.cm.co('/common/Value')}">
        <h:outputText value="#{property.value}" />
      </p:column>
    </p:dataTable>
  </h:form>
</p:dialog>

</cc:implementation>

</html>
