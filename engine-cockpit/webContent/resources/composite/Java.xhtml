<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:cc="jakarta.faces.composite" xmlns:ccc="jakarta.faces.composite/composite">

<cc:implementation>

<div class="card">
  <div class="card-header">
    <div class="card-title flex align-items-center">
      <i class="pr-3 ti ti-info-circle"></i>
      <h6 class="m-0" style="margin: 0; padding-left: 0">#{ivy.cm.co('/java/Java')}</h6>
      <p:commandButton id="tasksButtonJavaDetail" onclick="PF('javaDetailDialog').show();" title="#{ivy.cm.co('/java/JavaDetails')}" type="button"
        icon="ti ti-info-circle" styleClass="flex-shrink-0 ml-auto ui-button-secondary rounded-button" />
    </div>
  </div>
  <p:panelGrid columns="2" layout="flex" columnClasses="col-12 md:col-4 lg:col-4, col-12 md:col-8 lg:col-8"
    styleClass="grey-label-panel">
    <label>#{ivy.cm.co('/common/Product')}</label>
    <h:outputText value="#{javaBean.name}" />
    <label>#{ivy.cm.co('/java/Version')}</label>
    <h:outputText value="#{javaBean.version}" />
    <label>#{ivy.cm.co('/java/Vendor')}</label>
    <h:outputText value="#{javaBean.vendor}" />
    <label>Java Home</label>
    <h:outputText value="#{javaBean.home}" style="word-break: break-all;"/>
  </p:panelGrid>
</div>
<ccc:JavaInfo id="javaInfo" />

</cc:implementation>

</html>
