<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite">

<cc:implementation>
  <p:ajaxStatus id="ajaxLoadingStatus" delay="400">
    <f:facet name="start">
      <div class="axonivy-loader">
        <div class="spinner"></div>
        <h5>#{ivy.cm.co('/progressLoader/Loading')}</h5>
      </div>
    </f:facet>
    <f:facet name="complete">
      <h:outputText value="" />
    </f:facet>
  </p:ajaxStatus>
</cc:implementation>

</html>
