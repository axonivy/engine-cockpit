<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets" xmlns:p="http://primefaces.org/ui"
  xmlns:cc="jakarta.faces.composite">

<cc:implementation>
  <p:ajaxStatus id="ajaxLoadingStatus" delay="400">
    <f:facet name="start">
      <div class="axonivy-loader">
        <div class="spinner"></div>
        <h5>#{ivy.cm.co('/progressLoader/Loading')}</h5>
      </div>
    </f:facet>
    <f:facet name="complete">
      <h:outputText value="" />
    </f:facet>
  </p:ajaxStatus>
</cc:implementation>

</html>
