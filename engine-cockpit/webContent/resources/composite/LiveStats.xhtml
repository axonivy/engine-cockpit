<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui">
<cc:interface>
  <cc:attribute name="monitor" shortDescription="Monitor object" type="ch.ivyteam.enginecockpit.monitor.monitor.Monitor" />
  <cc:attribute name="id" shortDescription="div id" type="java.lang.String" />
</cc:interface>
<cc:implementation>
  <h4>#{cc.attrs.monitor.title}</h4>
  <p>
    <h:outputText value="#{cc.attrs.monitor.info}" />
  </p>
  <p:lineChart model="#{cc.attrs.monitor.model}" style="height:300px;" />
</cc:implementation>

</html>
