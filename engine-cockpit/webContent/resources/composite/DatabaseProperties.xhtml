<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:cc="jakarta.faces.composite" xmlns:ccc="jakarta.faces.composite/composite">

<cc:implementation>

<div class="card">
  <h:form id="databasePropertiesForm">
    <p:growl id="msg" for="msg" showDetail="true">
      <p:autoUpdate />
    </p:growl>
    <p:growl id="databaseConfigMsg" for="databaseConfigMsg" showDetail="true">
      <p:autoUpdate />
    </p:growl>
    <div class="card-header">
      <div class="card-title flex align-items-center">
        <i class="pr-3 ti ti-settings"></i>
        <h6 class="m-0">#{ivy.cm.co('/common/Properties')}</h6>
      </div>
    </div>

    <p:dataTable value="#{databaseBean.database.properties}"
      var="property" id="databasePropertiesTable"
      emptyMessage="#{ivy.cm.co('/common/NoRecordsFound')}">
      <p:column headerText="#{ivy.cm.co('/common/Property')}">
        <h:outputText value="#{property.name}"
          styleClass="database-property-key" />
      </p:column>
      <p:column headerText="#{ivy.cm.co('/common/Value')}">
        <h:outputText value="#{property.value}"
          styleClass="database-property-value" />
      </p:column>
      <p:column styleClass="table-btn-2">
        <f:facet name="header">
          <ccc:PropertyEditor id="newPropertyEditor"
            bean="#{databaseBean}" isNewProperty="true"
            property="#{property}"
            formName=":#{cc.clientId}:databasePropertiesForm" />
        </f:facet>
        <ccc:PropertyEditor id="editPropertyEditor"
          bean="#{databaseBean}" isNewProperty="false"
          property="#{property}"
          formName=":#{cc.clientId}:databasePropertiesForm" />
      </p:column>
    </p:dataTable>
  </h:form>
</div>

</cc:implementation>

</html>
