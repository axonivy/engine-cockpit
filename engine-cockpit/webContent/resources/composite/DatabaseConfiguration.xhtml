<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:cc="jakarta.faces.composite" xmlns:ccc="jakarta.faces.composite/composite">

<cc:implementation>

<div class="card">
  <h:form id="databaseConfigurationForm">
    <p:growl id="databaseConfigMsg" for="databaseConfigMsg" showDetail="true">
      <p:autoUpdate />
    </p:growl>
    <div class="card-header">
      <div class="card-title flex align-items-center">
        <i class="pr-2 ti ti-info-circle"></i>
        <h6 class="m-0">#{ivy.cm.co('/databaseConfiguration/DatabaseConfigurations')}</h6>
        <p:commandButton id="testDatabaseBtn" title="#{ivy.cm.co('/databaseConfiguration/TestDatabaseConnection')}" update=":#{cc.clientId}:connResult:connectionTestModel"
          oncomplete="PF('connectionTestModel').show()" icon="ti ti-phone-outgoing"
          actionListener="#{tlsTesterBean.setTlsTestRendered(false)}"
          styleClass="flex-shrink-0 ml-auto ui-button-secondary rounded-button" />
        <p:commandButton id="resetConfig" type="button" onclick="PF('resetDbConfirmDialog').show()"
          title="#{ivy.cm.co('/databaseConfiguration/ResetConfiguration')}" icon="ti ti-arrow-back-up" styleClass="flex-shrink-0 ml-1 ui-button-danger rounded-button" />
        <p:confirmDialog id="resetDbConfirmDialog" message="#{ivy.cm.co('/databaseConfiguration/ResetDatabaseConfirmDialogMessage')}"
          header="#{ivy.cm.co('/databaseConfiguration/ResetDatabaseConfirmDialogHeader')}" severity="alert" widgetVar="resetDbConfirmDialog">
          <p:commandButton value="#{ivy.cm.co('/common/Cancel')}" onclick="PF('resetDbConfirmDialog').hide();" type="button"
            styleClass="ui-button-secondary ui-button-flat modal-input-button" />
          <p:commandButton id="resetDbConfirmYesBtn" value="#{ivy.cm.co('/common/Reset')}"
            actionListener="#{databaseBean.resetDbConfig}" icon="ti ti-arrow-back-up" update="@form"
            styleClass="modal-input-button" />
        </p:confirmDialog>
        <p:commandButton id="saveDatabaseConfig" actionListener="#{databaseBean.saveDbConfig}"
          title="#{ivy.cm.co('/common/SaveChanges')}" icon="ti ti-device-floppy" styleClass="flex-shrink-0 ml-1 ui-button-success rounded-button"
          update="@form, :#{cc.clientId}:connResult:connectionTestModel" />
      </div>
    </div>

    <p:panelGrid columns="2" columnClasses="col-12 md:col-3 lg:col-3, col-12 md:col-9 lg:col-9" layout="flex"
      styleClass="grey-label-panel ui-fluid">
      <label>#{ivy.cm.co('/common/Name')}</label>
      <h:outputText id="name" value="#{databaseBean.name}" />
  
      <p:outputLabel for="url" value="#{ivy.cm.co('/common/Url')}" />
      <p:inputText id="url" value="#{databaseBean.database.url}" />
  
      <p:outputLabel for="driver" value="#{ivy.cm.co('/common/Driver')}" />
      <p:autoComplete id="driver" dropdown="true" value="#{databaseBean.database.driver}"
        completeMethod="#{databaseBean.completeDriver}" />
  
      <p:outputLabel for="userName" value="#{ivy.cm.co('/common/Username')}" />
      <p:inputText id="userName" value="#{databaseBean.database.userName}" />
  
      <p:outputLabel for="password" value="#{ivy.cm.co('/common/Password')}" />
      <p:password id="password"
        value="#{databaseBean.database.password}"
        promptLabel="#{ivy.cm.co('/common/PleaseEnterPassword')}"
        goodLabel="#{ivy.cm.co('/common/Good')}"
        weakLabel="#{ivy.cm.co('/common/Weak')}"
        strongLabel="#{ivy.cm.co('/common/Strong')}" />

      <p:outputLabel for="maxConnections" value="#{ivy.cm.co('/databaseConfiguration/MaxConnections')}" />
      <p:inputNumber id="maxConnections" value="#{databaseBean.database.maxConnections}"
        decimalPlaces="0" />
    </p:panelGrid>
  </h:form>
</div>

<ccc:ConnectionTestResult id="connResult" result="#{databaseBean.result}"
  url="#{databaseBean.database.url}" testMethod="#{databaseBean.testDbConnection()}"
  bean="#{tlsTesterBean}" reset="#{databaseBean.reset()}" />

</cc:implementation>

</html>
