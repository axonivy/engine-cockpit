<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:c="http://xmlns.jcp.org/jsp/jstl/core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite">

<cc:implementation>
<div class="card">
  <h:form id="appDetailStateForm">
    <div class="card-header">
      <div class="card-title flex align-items-center">
        <i class="pr-3 ti ti-settings-automation"></i>
        <h6 class="m-0">#{ivy.cm.co('/common/Activity')}</h6>
        
        <p:commandButton id="activateApplication" title="#{ivy.cm.co('/common/Activate')}" type="button" icon="ti ti-player-play"
          disabled="#{applicationVersionBean.notStartable}" styleClass="flex-shrink-0 ml-auto ui-button-success rounded-button">
          <p:ajax listener="#{applicationVersionBean.application.activate}" update="@form" />
        </p:commandButton>
        <p:commandButton id="deActivateApplication" title="#{ivy.cm.co('/common/Deactivate')}" type="button" icon="ti ti-player-stop"
          disabled="#{applicationVersionBean.notStopable}" styleClass="flex-shrink-0 ml-1 ui-button-danger rounded-button">
          <p:ajax listener="#{applicationVersionBean.application.deactivate}" update="@form" />
        </p:commandButton>   
      </div>
    </div>
    <p:panelGrid columns="2" columnClasses="col-12 md:col-4 lg:col-4, col-12 md:col-8 lg:col-8" layout="flex" styleClass="grey-label-panel">
      <label>#{ivy.cm.co('/common/State')}</label>
      <h:outputText>
        <i class="#{applicationVersionBean.state.operationIcon} icon-bold activity-state-#{applicationVersionBean.state.operationCssClass}"
          title="#{applicationVersionBean.state.operation}" />
      </h:outputText>
      <label>#{ivy.cm.co('/common/ConfiguredState')}</label>
      <h:outputText>
        <i class="#{applicationVersionBean.state.stateIcon} icon-bold activity-state-#{applicationVersionBean.state.stateCssClass}"
          title="#{applicationVersionBean.state.state}" />
      </h:outputText>
    </p:panelGrid>
    <p:poll listener="#{applicationVersionBean.updateStats}" update="@form"
      autoStart="#{applicationVersionBean.state.processing}" interval="1" />
  </h:form>
</div>
</cc:implementation>

</html>
