<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui">
<cc:interface>
  <cc:attribute name="monitor" shortDescription="Monitor object" type="ch.ivyteam.enginecockpit.monitor.monitor.Monitor" />
  <cc:attribute name="id" shortDescription="div id" type="java.lang.String" />
</cc:interface>
<cc:implementation>
  <div class="col-12 lg:col-6" id="#{cc.attrs.id}">
    <div class="card">
      <div class="card-header">
        <div class="card-title flex align-items-center">
          <i class="pr-3 #{cc.attrs.monitor.icon}"></i>
          <h6 class="m-0">#{cc.attrs.monitor.title}</h6>
          <h:outputText class="pl-4 ml-auto" value="#{cc.attrs.monitor.info}" />
        </div>
      </div>
      <p:lineChart model="#{cc.attrs.monitor.model}" style="width:95%;" />
    </div>
  </div>
</cc:implementation>
</html>
