<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:cc="jakarta.faces.composite">

<cc:implementation>

<div class="card">
  <h:form id="databaseConnectionForm">
    <p:growl id="databaseConfigMsg" for="databaseConfigMsg" showDetail="true">
      <p:autoUpdate />
    </p:growl>
    <div class="card-header">
      <div class="card-title flex align-items-center">
        <i class="pr-2 ti ti-link"></i>
        <h6 class="m-0">#{ivy.cm.co('/common/Connections')}</h6>
      </div>
    </div>

    <p:dataTable value="#{databaseBean.connections}" var="conn" emptyMessage="#{ivy.cm.co('/common/NoRecordsFound')}"
      id="databaseConnectionsTable" paginator="true" rows="10" paginatorPosition="bottom" paginatorAlwaysVisible="false">
      <p:column headerText="#{ivy.cm.co('/databaseConnections/InUse')}" sortBy="#{conn.inUse}">
        <h:outputText styleClass="connection">
          <i class="#{conn.inUse ? 'ti ti-circle-check' : 'ti ti-circle-minus'} table-icon"></i>
        </h:outputText>
      </p:column>
      <p:column headerText="#{ivy.cm.co('/databaseConnections/LastUsed')}" sortBy="#{conn.lastUsed}">
        <h:outputText value="#{conn.lastUsed}" />
      </p:column>
    </p:dataTable>
  </h:form>
</div>

</cc:implementation>

</html>
