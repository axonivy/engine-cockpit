<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions" 
  xmlns:cc="jakarta.faces.composite" xmlns:ccc="jakarta.faces.composite/composite">

<cc:interface>
  <cc:attribute name="application" type="ch.ivyteam.ivy.application.IApplication" required="true" />
  <cc:attribute name="securitySystem" type="ch.ivyteam.enginecockpit.security.model.SecuritySystem"  required="true" />
</cc:interface>

<cc:implementation>
<div class="card">
  <h:form id="appDetailSecurityForm">
    <div class="card-header">
      <div class="card-title flex align-items-center">
        <i class="pr-3 ti ti-lock"></i>
        <h6 class="m-0">#{ivy.cm.co('/common/SecuritySystem')}</h6>
        <p:commandButton id="moveApplication" title="#{ivy.cm.co('/security/ChangeSecuritySystem')}" type="button" icon="ti ti-pencil" onclick="PF('moveApplicationModal').show();"
          styleClass="flex-shrink-0 ml-auto rounded-button">
          <p:ajax listener="#{moveApplicationBean.setApp(cc.attrs.application)}" 
            update=":security:moveApplicationComposite:moveApplicationForm" />
        </p:commandButton>
        <p:commandButton id="synchronizeSecurity"
          rendered="#{cc.attrs.securitySystem.securitySystemProvider ne 'ivy Security System'}"
          title="#{ivy.cm.co('/common/Synchronize')}" type="button"
          icon="ti ti-refresh #{securityBean.syncRunningForSelectedApp ? 'spinning' : ''}"
          styleClass="ml-1 ui-button-secondary rounded-button spin-icon" onclick="PF('logPoller').start()">
          <p:ajax listener="#{securityBean.triggerSyncForSelectedApp}" update="@this" />
        </p:commandButton>
        <p:poll widgetVar="logPoller" autoStart="#{securityBean.syncRunningForSelectedApp}" interval="5" update="@form" />
        <p:linkButton id="showAdSyncLogBtn" icon="ti ti-file-text" styleClass="ml-1 ui-button-secondary rounded-button"
          href="#{securityBean.synchLogUri}" rendered="#{!securityBean.ivySecurityForSelectedApp}" />
      </div>
    </div>
    <p:panelGrid columns="2" columnClasses="col-12 md:col-4 lg:col-4, col-12 md:col-8 lg:col-8" layout="flex" styleClass="grey-label-panel">
      <label>#{ivy.cm.co('/common/Name')}</label>
      <h:outputLink value="#{cc.attrs.securitySystem.link}">
        <h:outputText value="#{cc.attrs.securitySystem.securitySystemName}"
          rendered="#{not empty cc.attrs.securitySystem.link}">
          <i class="ti ti-lock link-icon"></i>
        </h:outputText>
      </h:outputLink>
      <label>#{ivy.cm.co('/common/Provider')}</label>
      <h:outputText value="#{cc.attrs.securitySystem.securitySystemProvider}" />
      <label>#{ivy.cm.co('/common/Users')}</label>
      <h:outputLink value="users.xhtml">
        <h:outputText value="#{cc.attrs.securitySystem.usersCount}">
          <i class="ti ti-user link-icon"></i>
        </h:outputText>
      </h:outputLink>
      <label>#{ivy.cm.co('/common/Roles')}</label>
      <h:outputLink value="roles.xhtml">
        <h:outputText value="#{cc.attrs.securitySystem.rolesCount}">
          <i class="ti ti-users link-icon"></i>
        </h:outputText>
      </h:outputLink>
    </p:panelGrid>
  </h:form>

  <ccc:MoveApplication id="moveApplicationComposite"  />
</div>
</cc:implementation>

</html>
