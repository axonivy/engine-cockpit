<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui">
<cc:interface>
  <cc:attribute name="box" type="java.lang.String"/>
  <cc:attribute name="icon" type="java.lang.String"/>
  <cc:attribute name="title" type="java.lang.String"/>
  <cc:attribute name="count" type="java.lang.String"/>
  <cc:attribute name="link" type="java.lang.String"/>
</cc:interface>
<cc:implementation>
  <div class="col">
    <div class="card overview-box #{cc.attrs.box}" onclick="window.location.href='#{cc.attrs.link}'"
      style="cursor: #{empty cc.attrs.link ? 'normal' : 'pointer'};">
      <div class="overview-info">
        <h6>#{cc.attrs.title}</h6>
        <h1>#{cc.attrs.count}</h1>
      </div>
      <i class="#{cc.attrs.icon}"></i>
    </div>
  </div>
</cc:implementation>

</html>
