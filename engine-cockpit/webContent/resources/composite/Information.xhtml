<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:c="http://xmlns.jcp.org/jsp/jstl/core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite"  xmlns:ccc="http://xmlns.jcp.org/jsf/composite/composite">

<cc:implementation>
<div class="card">
  <h:form id="appDetailInfoForm">
    <div class="card-header">
      <div class="card-title flex align-items-center">
        <i class="pr-3 ti ti-info-circle"></i>
        <h6 class="m-0">#{ivy.cm.co('/information/ApplicationInformation')}</h6>
        <p:linkButton id="home" title="#{ivy.cm.co('/information/ApplicationHome')}" icon="ti ti-home"
          href="#{applicationVersionBean.homeUrl}" disabled="#{applicationVersionBean.disabled}"
          styleClass="flex-shrink-0 ml-auto rounded-button"/>
        <p:linkButton id="workflow" title="#{ivy.cm.co('/information/WorkflowUI')}" icon="ti ti-list" 
          href="#{applicationVersionBean.devWorkflowUrl}" disabled="#{applicationVersionBean.disabled}"
          styleClass="flex-shrink-0 ml-1 rounded-button"/>
      </div>
    </div>
    
    <p:panelGrid columns="2" columnClasses="col-12 md:col-4 lg:col-4, col-12 md:col-8 lg:col-8" layout="flex"
      styleClass="grey-label-panel ui-fluid">
      <label>#{ivy.cm.co('/common/Name')}</label>
      <h:outputText value="#{applicationVersionBean.application.name}" />
      <label>#{ivy.cm.co('/common/Version')}</label>
      <h:outputText value="#{applicationVersionBean.appVersion}" />
      <label>#{ivy.cm.co('/information/FileDirectory')}</label>
      <h:outputText value="#{applicationVersionBean.fileDir}" />
    </p:panelGrid>
    <p:panelGrid columns="1" layout="flex">
      <h:panelGroup id="deployBtnHint">
        <p:commandButton id="showDeployment" title="#{ivy.cm.co('/common/Deployment')}" value="#{ivy.cm.co('/common/Deployment')}"
          style="margin-top: 20px; min-width: 150px;" icon="ti ti-upload"
          onclick="PF('fileUploadModal').show()" 
          actionListener="#{deploymentBean.setAppNameAndVersion(applicationVersionBean.securitySystem, applicationVersionBean.application.name, applicationVersionBean.appVersion)}"/>
      </h:panelGroup>
    </p:panelGrid>
  </h:form>
</div>

<h:panelGroup id="deployPanel">
  <ccc:Deployment id="deployment" />
</h:panelGroup>
</cc:implementation>

</html>
