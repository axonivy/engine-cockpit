<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:cc="jakarta.faces.composite"  xmlns:ccc="jakarta.faces.composite/composite">

<cc:implementation>
<div class="card">
  <h:form id="appDetailInfoForm">
    <div class="card-header">
      <div class="card-title flex align-items-center">
        <i class="pr-2 ti ti-info-circle"></i>
        <h6 class="m-0">#{ivy.cm.co('/information/ApplicationInformation')}</h6>
      </div>
    </div>
    
    <p:panelGrid columns="2" columnClasses="col-12 md:col-4 lg:col-4, col-12 md:col-8 lg:col-8" layout="flex"
      styleClass="grey-label-panel ui-fluid">
      <label>#{ivy.cm.co('/common/Name')}</label>
      <h:outputText value="#{applicationVersionBean.application.name}" />
      <label>#{ivy.cm.co('/common/Version')}</label>
      <h:outputText value="#{applicationVersionBean.version}" />
      <label>Install Directory</label>
      <h:outputText value="#{applicationVersionBean.installDir}" />
      <label>Data Directory</label>
      <h:outputText value="#{applicationVersionBean.dataDir}" />
      <label>Config Directory</label>
      <h:outputText value="#{applicationVersionBean.configDir}" />
    </p:panelGrid>
  </h:form>
</div>

</cc:implementation>

</html>
