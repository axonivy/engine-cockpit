<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions" 
  xmlns:cc="jakarta.faces.composite" xmlns:ccc="jakarta.faces.composite/composite">

<cc:interface>
  <cc:attribute name="bean" type="ch.ivyteam.enginecockpit.application.ApplicationBean" required="true" />
</cc:interface>

<cc:implementation>
<div class="card">
  <div class="card-header">
    <div class="card-title flex align-items-center">
      <i class="pr-2 ti ti-settings"></i>
      <h6 class="m-0">#{ivy.cm.co('/configuration/ApplicationConfiguration')}</h6>

      <p:commandButton id="reloadConfig" title="#{ivy.cm.co('/configuration/ReloadApplicationConfiguration')}" icon="ti ti-refresh"
          actionListener="#{cc.attrs.bean.reloadConfig}"
          styleClass="flex-shrink-0 ml-auto rounded-button"/>
    </div>  
  </div>
  
  <ccc:Configuration id="config" bean="#{cc.attrs.bean.configView}" />
  <ccc:TableFilter
    id="contentFilter"
    bean="#{cc.attrs.bean.configView}"
    for=":#{cc.clientId}:config:form:configTable:filterBtn"
    update=":#{cc.clientId}:config:form :#{cc.clientId}:contentFilter:filterPanel" />
</div>
</cc:implementation>

</html>
