<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
  <h:body>
    <h1>
     CockpitLinkFactory
   </h1>

    <h:form id="form">
      <ui:repeat value="#{linkFactoryBean.links}" var="link">
        <p:link href="#{link.href}" value="#{link.title}"/>
        <br/>
      </ui:repeat>
    </h:form>
  </h:body>
</html>
